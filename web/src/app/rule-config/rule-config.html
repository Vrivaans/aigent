<div class="rules-container">
  <h3>Reglas de Comportamiento</h3>
  <p class="desc">Define el contexto permanente que el AIgent debe obedecer.</p>

  <div class="add-box">
    <input 
      type="text" 
      placeholder="Categoría (ej: Idioma)" 
      [ngModel]="newCategory()"
      (ngModelChange)="newCategory.set($event)">
      
    <textarea 
      placeholder="Descripción (ej: Responder siempre en español)" 
      [ngModel]="newContent()"
      (ngModelChange)="newContent.set($event)"
      rows="2">
    </textarea>
    
    <button (click)="createRule()" [disabled]="!newCategory() || !newContent()">
      Agregar Regla
    </button>
  </div>

  <div class="rules-list">
    @for (rule of rules(); track rule.id) {
      <div class="rule-card">
        <div class="header">
          <span class="category">{{rule.category}}</span>
          <button class="delete-btn" (click)="deleteRule(rule.id)">×</button>
        </div>
        <div class="content">{{rule.content}}</div>
      </div>
    }

    @if (rules().length === 0) {
      <div class="empty">No hay reglas configuradas.</div>
    }
  </div>
</div>
